# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
version: "3.9"

services:
  server:
    build:
      context: .          # ← Important: root of project
      dockerfile: Dockerfile
    working_dir: /run/Server
    volumes:
      - ./Server:/run/Server:ro
      - ./common:/run/common:ro     # ← Mount shared code
      - ./run/Server:/run/Server/output
    ports:
      - "8800:8800"
    command: ["gunicorn", "--bind", "0.0.0.0:8800", "--workers", "2", "Server_main:app"]
    # restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /run/Clients
    volumes:
      - ./Client:/run/Clients:ro
      - ./common:/run/common:ro     # ← Mount shared code
      - ./run/Clients:/run/Clients/output
    command: ["python", "Client_main.py"]
    # restart: "no"  

